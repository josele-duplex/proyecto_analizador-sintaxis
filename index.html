<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analizador de Oraciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --font-oracion:'Lora','Georgia',serif;
    --font-ui:'DM Sans','Nunito',system-ui,sans-serif;
    --bg-pagina:#F4F5F8;
    --bg-token:#E8E9EC;
    --borde-token:#C9C3B5;
    --texto-token:#1C1510;

    --c-SN-bg:#DBEAFE;   --c-SN-border:#60A5FA;   --c-SN-text:#1E3A8A;
    --c-SV-bg:#D1FAE5;   --c-SV-border:#34D399;   --c-SV-text:#065F46;
    --c-SP-bg:#EDE9FE;   --c-SP-border:#A78BFA;   --c-SP-text:#4C1D95;
    --c-SAdj-bg:#FCE7F3; --c-SAdj-border:#F472B6; --c-SAdj-text:#9D174D;
    --c-SAdv-bg:#FFEDD5; --c-SAdv-border:#FB923C; --c-SAdv-text:#9A3412;
  }

  html{
    -webkit-text-size-adjust:100%;
  }

  body{
    font-family:var(--font-ui);
    background:var(--bg-pagina);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
    -webkit-tap-highlight-color:transparent;
    transition:padding-bottom .22s ease;
  }

  h1{
    font-family:var(--font-ui);
    font-size:1.1rem;
    font-weight:700;
    color:#5C6B7E;
    text-transform:uppercase;
    letter-spacing:.04em;
    margin-bottom:32px;
  }

  #oracion{
    max-width:900px;
    display:flex;
    flex-wrap:wrap;
    gap:10px 8px;
    justify-content:center;
    align-items:center;
  }

  .token{
    font-family:var(--font-oracion);
    font-size:22px;
    color:var(--texto-token);
    background:var(--bg-token);
    border:1px solid var(--borde-token);
    border-radius:8px;
    padding:10px 12px;
    line-height:1.3;
    min-height:44px;
    display:inline-flex;
    align-items:center;
    user-select:none;
    cursor:pointer;
    touch-action:manipulation;
  }

  .token.seleccionado{
    background:#FEF3C7;
    border-color:#D97706;
  }

  .token.tipo-SN{   background:var(--c-SN-bg);   border-color:var(--c-SN-border);   color:var(--c-SN-text);   cursor:default; }
  .token.tipo-SV{   background:var(--c-SV-bg);   border-color:var(--c-SV-border);   color:var(--c-SV-text);   cursor:default; }
  .token.tipo-SP{   background:var(--c-SP-bg);   border-color:var(--c-SP-border);   color:var(--c-SP-text);   cursor:default; }
  .token.tipo-SAdj{ background:var(--c-SAdj-bg); border-color:var(--c-SAdj-border); color:var(--c-SAdj-text); cursor:default; }
  .token.tipo-SAdv{ background:var(--c-SAdv-bg); border-color:var(--c-SAdv-border); color:var(--c-SAdv-text); cursor:default; }

  .puntuacion{
    font-family:var(--font-oracion);
    font-size:22px;
    color:var(--texto-token);
  }

  #panel-tipo{
    position:fixed;
    left:0;right:0;bottom:0;
    background:#FFFFFF;
    border-top:1px solid var(--borde-token);
    box-shadow:0 -4px 16px rgba(15,35,66,.08);
    padding:14px 20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:80vh;
    overflow-y:auto;
    transform:translateY(100%);
    transition:transform .22s ease;
  }

  #panel-tipo.visible{
    transform:translateY(0);
  }

  .panel-fila{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:center;
  }

  #fila-funcion{
    display:none;
    padding-top:8px;
    border-top:1px dashed var(--borde-token);
  }

  .panel-etiqueta{
    font-family:var(--font-ui);
    font-size:13px;
    font-weight:700;
    color:#5C6B7E;
    margin-right:6px;
  }

  .btn-tipo{
    font-family:var(--font-ui);
    font-size:14px;
    font-weight:700;
    padding:10px 16px;
    min-height:44px;
    border-radius:999px;
    border:2px solid transparent;
    background:var(--bg-token);
    color:#5C6B7E;
    cursor:pointer;
    touch-action:manipulation;
  }

  .btn-tipo[data-tipo="SN"].activo{   background:var(--c-SN-bg);   border-color:var(--c-SN-border);   color:var(--c-SN-text); }
  .btn-tipo[data-tipo="SV"].activo{   background:var(--c-SV-bg);   border-color:var(--c-SV-border);   color:var(--c-SV-text); }
  .btn-tipo[data-tipo="SP"].activo{   background:var(--c-SP-bg);   border-color:var(--c-SP-border);   color:var(--c-SP-text); }
  .btn-tipo[data-tipo="SAdj"].activo{ background:var(--c-SAdj-bg); border-color:var(--c-SAdj-border); color:var(--c-SAdj-text); }
  .btn-tipo[data-tipo="SAdv"].activo{ background:var(--c-SAdv-bg); border-color:var(--c-SAdv-border); color:var(--c-SAdv-text); }

  .btn-funcion{
    font-family:var(--font-ui);
    font-size:13px;
    font-weight:700;
    padding:9px 14px;
    min-height:44px;
    border-radius:999px;
    border:2px solid transparent;
    background:var(--bg-token);
    color:#5C6B7E;
    cursor:pointer;
    touch-action:manipulation;
  }

  .btn-funcion.activo{
    background:#E5F4F1;
    border-color:#0F766E;
    color:#115E59;
  }

  .btn-accion{
    font-family:var(--font-ui);
    font-size:14px;
    font-weight:700;
    padding:10px 18px;
    min-height:44px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    margin-left:10px;
    touch-action:manipulation;
  }

  #btn-confirmar{
    background:#0F766E;
    color:#fff;
  }

  #btn-confirmar:disabled{
    background:#C9C3B5;
    cursor:not-allowed;
  }

  #btn-cancelar{
    background:transparent;
    color:#5C6B7E;
    border:1px solid var(--borde-token);
  }

  #bloque-eliptico{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
  }

  .btn-eliptico{
    font-family:var(--font-ui);
    font-size:13px;
    font-weight:700;
    padding:9px 14px;
    min-height:44px;
    border-radius:999px;
    border:1px dashed var(--borde-token);
    background:transparent;
    color:#5C6B7E;
    cursor:pointer;
    touch-action:manipulation;
  }

  .form-eliptico{
    display:none;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    justify-content:center;
  }

  .form-eliptico select{
    font-family:var(--font-ui);
    font-size:13px;
    padding:9px 10px;
    min-height:44px;
    border-radius:8px;
    border:1px solid var(--borde-token);
    color:var(--texto-token);
  }

  .badge-eliptico{
    display:none;
    align-items:center;
    gap:6px;
    font-family:var(--font-ui);
    font-size:13px;
    font-weight:700;
    padding:9px 14px;
    min-height:44px;
    border-radius:999px;
    background:var(--c-SN-bg);
    border:1px solid var(--c-SN-border);
    color:var(--c-SN-text);
    cursor:pointer;
    touch-action:manipulation;
  }

  /* ── Barra de acciones (Comprobar / Ver solución) ── */
  #barra-acciones{
    display:flex;
    gap:12px;
    justify-content:center;
    margin-top:32px;
  }

  .btn-principal{
    font-family:var(--font-ui);
    font-size:15px;
    font-weight:700;
    padding:12px 28px;
    min-height:44px;
    border-radius:999px;
    border:none;
    background:#0F766E;
    color:#fff;
    cursor:pointer;
    touch-action:manipulation;
  }

  .btn-principal:disabled{
    background:#C9C3B5;
    cursor:not-allowed;
  }

  .btn-secundario{
    font-family:var(--font-ui);
    font-size:15px;
    font-weight:700;
    padding:12px 22px;
    min-height:44px;
    border-radius:999px;
    border:1px solid var(--borde-token);
    background:transparent;
    color:#5C6B7E;
    cursor:pointer;
    touch-action:manipulation;
  }

  /* ── Indicadores de estado sobre los tokens tras comprobar ── */
  .token.estado-ok{   box-shadow:0 0 0 3px #15803D; }
  .token.estado-alt{  box-shadow:0 0 0 3px #1E40AF; }
  .token.estado-error{box-shadow:0 0 0 3px #BE123C; }

  /* ── Núcleo del sintagma (análisis interno mínimo) ── */
  .token.token-nucleo{
    text-decoration:underline;
    text-decoration-thickness:3px;
    text-underline-offset:4px;
  }

  .token.elige-nucleo{
    cursor:pointer;
    outline:2px dashed #B45309;
    outline-offset:2px;
  }

  #banner-nucleo{
    display:none;
    max-width:700px;
    margin:0 auto 20px;
    text-align:center;
    font-family:var(--font-ui);
    font-size:14px;
    font-weight:700;
    color:#92400E;
    background:#FEF3C7;
    border:1px solid #D97706;
    border-radius:12px;
    padding:10px 16px;
  }

  /* ── Panel de resultados ── */
  #resultados{
    max-width:760px;
    margin:24px auto 0;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .resultado-item{
    font-family:var(--font-ui);
    font-size:14px;
    line-height:1.5;
    padding:12px 16px;
    border-radius:12px;
    border:1px solid var(--borde-token);
    display:flex;
    gap:10px;
    align-items:flex-start;
  }

  .resultado-item .icono{
    font-size:16px;
    line-height:1.4;
    flex-shrink:0;
  }

  .resultado-item.ok{    background:#D6F0E3; border-color:#15803D; }
  .resultado-item.alt{   background:#D6E4F7; border-color:#1E40AF; }
  .resultado-item.error{ background:#FDE8E8; border-color:#BE123C; }
  .resultado-item.falta{ background:#FEF3C7; border-color:#B45309; }

  .resultado-grupo{
    font-family:var(--font-oracion);
    font-weight:600;
  }

  #resumen-resultados{
    font-family:var(--font-ui);
    font-size:15px;
    font-weight:700;
    text-align:center;
    color:var(--texto-token);
    margin-bottom:4px;
  }
</style>
</head>
<body>

<h1>Analizador de Oraciones</h1>

<div id="bloque-eliptico">
  <button id="btn-eliptico" class="btn-eliptico">+ Sujeto elíptico</button>
  <div id="form-eliptico" class="form-eliptico">
    <span class="panel-etiqueta">Persona del sujeto elíptico:</span>
    <select id="select-persona">
      <option value="1sg">1ª persona singular (yo)</option>
      <option value="2sg">2ª persona singular (tú)</option>
      <option value="3sg">3ª persona singular (él/ella/usted)</option>
      <option value="1pl">1ª persona plural (nosotros)</option>
      <option value="2pl">2ª persona plural (vosotros)</option>
      <option value="3pl">3ª persona plural (ellos/ellas/ustedes)</option>
    </select>
    <button id="btn-confirmar-eliptico" class="btn-accion" style="background:#0F766E;color:#fff">Confirmar</button>
    <button id="btn-cancelar-eliptico" class="btn-accion">Cancelar</button>
  </div>
  <span id="badge-eliptico" class="badge-eliptico"></span>
</div>

<div id="banner-nucleo"></div>

<div id="oracion"></div>

<div id="barra-acciones">
  <button id="btn-comprobar" class="btn-principal">Comprobar</button>
  <button id="btn-ver-solucion" class="btn-secundario">Ver solución</button>
</div>

<div id="resultados"></div>

<div id="panel-tipo">
  <div class="panel-fila">
    <span class="panel-etiqueta">Tipo de sintagma:</span>
    <button class="btn-tipo" data-tipo="SN">SN</button>
    <button class="btn-tipo" data-tipo="SV">SV</button>
    <button class="btn-tipo" data-tipo="SP">SP</button>
    <button class="btn-tipo" data-tipo="SAdj">SAdj</button>
    <button class="btn-tipo" data-tipo="SAdv">SAdv</button>
  </div>
  <div class="panel-fila" id="fila-funcion"></div>
  <div class="panel-fila">
    <button id="btn-confirmar" class="btn-accion" disabled>Confirmar</button>
    <button id="btn-cancelar" class="btn-accion">Cancelar</button>
  </div>
</div>

<script>
  // Array de oraciones disponibles (Fase 2: 3-5 oraciones). El motor de
  // validación de abajo no conoce este array: solo trabaja con la variable
  // `oracion` ya resuelta, así que añadir oraciones no le afecta.
  const ORACIONES = [
  {
    id: "oracion_001",
    texto: "Ayer los dos hermanos pequeños de María entregaron rápidamente a su profesora de Lengua un precioso ramo de flores del jardín.",
    tokens: [
      { id: 0,  forma: "Ayer",       categoria: "Adv" },
      { id: 1,  forma: "los",        categoria: "Det" },
      { id: 2,  forma: "dos",        categoria: "Det" },
      { id: 3,  forma: "hermanos",   categoria: "Sust" },
      { id: 4,  forma: "pequeños",   categoria: "Adj" },
      { id: 5,  forma: "de",         categoria: "Prep" },
      { id: 6,  forma: "María",      categoria: "NProp" },
      { id: 7,  forma: "entregaron", categoria: "V" },
      { id: 8,  forma: "rápidamente",categoria: "Adv" },
      { id: 9,  forma: "a",          categoria: "Prep" },
      { id: 10, forma: "su",         categoria: "Det" },
      { id: 11, forma: "profesora",  categoria: "Sust" },
      { id: 12, forma: "de",         categoria: "Prep" },
      { id: 13, forma: "Lengua",     categoria: "NProp" },
      { id: 14, forma: "un",         categoria: "Det" },
      { id: 15, forma: "precioso",   categoria: "Adj" },
      { id: 16, forma: "ramo",       categoria: "Sust" },
      { id: 17, forma: "de",         categoria: "Prep" },
      { id: 18, forma: "flores",     categoria: "Sust" },
      { id: 19, forma: "del",        categoria: "Prep" },
      { id: 20, forma: "jardín",     categoria: "Sust" }
    ],

    // Modelo plano: el verbo es SV/Predicado y cada complemento es un
    // sintagma hermano (igual que el ejemplo del GDD §5.1).
    solucion_canonica: {
      sintagmas: [
        { id: "s1", tokens: [0],                     tipo: "SAdv", funcion: "CC_Tiempo", nucleo: 0  },
        { id: "s2", tokens: [1,2,3,4,5,6],           tipo: "SN",   funcion: "Sujeto",    nucleo: 3  },
        { id: "s3", tokens: [7],                     tipo: "SV",   funcion: "Predicado", nucleo: 7  },
        { id: "s4", tokens: [8],                     tipo: "SAdv", funcion: "CC_Modo",   nucleo: 8  },
        { id: "s5", tokens: [9,10,11,12,13],         tipo: "SP",   funcion: "CI",        nucleo: 11 },
        { id: "s6", tokens: [14,15,16,17,18,19,20],  tipo: "SN",   funcion: "CD",        nucleo: 16 }
      ]
    },

    // Lecturas alternativas aceptables para la MISMA segmentación (mismo
    // conjunto de tokens, distinto tipo/función). Esta oración no tiene
    // ninguna sólida a nivel de constituyente; el mecanismo queda listo.
    alternativas: [],

    // Mensajes para errores de SEGMENTACIÓN previsibles, identificados por
    // el conjunto exacto de tokens que el alumno agrupó mal.
    feedback: {
      errores_comunes: [
        {
          tokens: [5,6],
          mensaje: "«de María» no es un complemento del verbo: forma parte del sujeto «los dos hermanos pequeños de María» (¿de quién son hermanos? de María). Modifica al sustantivo «hermanos»."
        },
        {
          tokens: [12,13],
          mensaje: "«de Lengua» modifica a «profesora», no al verbo. Forma parte del sintagma «a su profesora de Lengua»."
        },
        {
          tokens: [19,20],
          mensaje: "«del jardín» no es un complemento del verbo. Pregúntate: ¿entregaron del jardín? No. Lo que está del jardín son las flores: forma parte del SN «un precioso ramo de flores del jardín»."
        },
        {
          tokens: [17,18,19,20],
          mensaje: "«de flores del jardín» depende del sustantivo «ramo», no del verbo. Forma parte del SN «un precioso ramo de flores del jardín» (CD)."
        }
      ]
    }
  }
  ]; // fin de ORACIONES

  // Selecciona la oración a trabajar: por parámetro de URL (?oracion=id)
  // si existe y es válido, si no al azar entre todas las disponibles.
  function seleccionarOracion() {
    const params = new URLSearchParams(window.location.search);
    const idPedido = params.get('oracion');
    if (idPedido) {
      const encontrada = ORACIONES.find(o => o.id === idPedido);
      if (encontrada) return encontrada;
    }
    return ORACIONES[Math.floor(Math.random() * ORACIONES.length)];
  }

  const oracion = seleccionarOracion();

  // Funciones sintácticas válidas por tipo de sintagma (alcance v1: sin
  // Atributo ni C. Agente, que exigen copulativa o pasiva — fuera de v1).
  const FUNCIONES_POR_TIPO = {
    SN:   ['Sujeto', 'CD', 'CPred'],
    SV:   ['Predicado'],
    SP:   ['CD', 'CI', 'CC_Lugar', 'CC_Tiempo', 'CC_Modo', 'CC_Causa', 'CRV'],
    SAdj: ['CPred'],
    SAdv: ['CC_Lugar', 'CC_Tiempo', 'CC_Modo']
  };

  const ETIQUETAS_FUNCION = {
    Sujeto: 'Sujeto',
    CD: 'CD',
    CI: 'CI',
    CC_Lugar: 'CC Lugar',
    CC_Tiempo: 'CC Tiempo',
    CC_Modo: 'CC Modo',
    CC_Causa: 'CC Causa',
    CPred: 'CPred',
    CRV: 'CRV',
    Predicado: 'Predicado'
  };

  // Estado de selección: ids de token actualmente seleccionados.
  const seleccion = new Set();

  // Sintagmas ya etiquetados: { id, tokens: [...], tipo, funcion }.
  const sintagmas = [];

  let tipoActivo = null;
  let funcionActiva = null;
  let sujetoEliptico = null; // { persona, etiqueta } o null

  // Análisis interno mínimo (v1): solo se marca el núcleo del SN sujeto y
  // del SV predicado. id del sintagma que está esperando que el alumno
  // marque su núcleo (o null si no hay ninguno pendiente).
  let sintagmaEligiendoNucleo = null;

  function sintagmaDeToken(tokenId) {
    return sintagmas.find(s => s.tokens.includes(tokenId));
  }

  function requiereNucleo(tipo, funcion) {
    return (tipo === 'SN' && funcion === 'Sujeto') || (tipo === 'SV' && funcion === 'Predicado');
  }

  function alternarSeleccion(tokenId) {
    if (sintagmaEligiendoNucleo) {
      marcarNucleo(tokenId);
      return;
    }

    if (sintagmaDeToken(tokenId)) return; // ya pertenece a un sintagma: no se reselecciona

    if (seleccion.has(tokenId)) {
      seleccion.delete(tokenId);
    } else {
      seleccion.add(tokenId);
    }
    actualizarEstiloTokens();
    actualizarPanelTipo();
  }

  function marcarNucleo(tokenId) {
    const sint = sintagmas.find(s => s.id === sintagmaEligiendoNucleo);
    if (!sint || !sint.tokens.includes(tokenId)) return; // solo cuenta un clic dentro del propio sintagma

    sint.nucleo = tokenId;
    sintagmaEligiendoNucleo = null;
    actualizarEstiloTokens();
    actualizarBannerNucleo();
  }

  function actualizarBannerNucleo() {
    const banner = document.getElementById('banner-nucleo');
    if (!sintagmaEligiendoNucleo) {
      banner.style.display = 'none';
      return;
    }
    const sint = sintagmas.find(s => s.id === sintagmaEligiendoNucleo);
    banner.textContent = 'Marca el núcleo de «' + formasDe(sint.tokens) + '»';
    banner.style.display = 'block';
  }

  function actualizarEstiloTokens() {
    document.querySelectorAll('.token').forEach(span => {
      const tokenId = Number(span.dataset.tokenId);
      const sint = sintagmaDeToken(tokenId);

      span.classList.remove('seleccionado', 'tipo-SN', 'tipo-SV', 'tipo-SP', 'tipo-SAdj', 'tipo-SAdv',
                            'estado-ok', 'estado-alt', 'estado-error', 'token-nucleo', 'elige-nucleo');

      if (sint) {
        span.classList.add('tipo-' + sint.tipo);
        if (sint.nucleo === tokenId) span.classList.add('token-nucleo');
        if (sintagmaEligiendoNucleo === sint.id) span.classList.add('elige-nucleo');
      } else if (seleccion.has(tokenId)) {
        span.classList.add('seleccionado');
      }
    });
  }

  function actualizarPanelTipo() {
    const panel = document.getElementById('panel-tipo');
    panel.classList.toggle('visible', seleccion.size > 0);

    if (seleccion.size === 0) {
      resetPanelEtiquetado();
    }
    ajustarEspacioPanel();
  }

  // El panel inferior es position:fixed; sin esto taparía la oración o los
  // resultados en pantallas bajas (Chromebook en horizontal, tablet).
  function ajustarEspacioPanel() {
    const panel = document.getElementById('panel-tipo');
    const visible = panel.classList.contains('visible');
    document.body.style.paddingBottom = visible ? (panel.offsetHeight + 40) + 'px' : '40px';
  }

  function resetPanelEtiquetado() {
    tipoActivo = null;
    funcionActiva = null;
    actualizarBotonesTipo();
    renderBotonesFuncion();
    actualizarBotonConfirmar();
  }

  function actualizarBotonesTipo() {
    document.querySelectorAll('.btn-tipo').forEach(btn => {
      btn.classList.toggle('activo', btn.dataset.tipo === tipoActivo);
    });
  }

  function elegirTipo(tipo) {
    tipoActivo = (tipoActivo === tipo) ? null : tipo;
    funcionActiva = null;
    actualizarBotonesTipo();
    renderBotonesFuncion();
    actualizarBotonConfirmar();
  }

  function renderBotonesFuncion() {
    const fila = document.getElementById('fila-funcion');
    fila.innerHTML = '';

    if (!tipoActivo) {
      fila.style.display = 'none';
      ajustarEspacioPanel();
      return;
    }

    fila.style.display = 'flex';

    const etiqueta = document.createElement('span');
    etiqueta.className = 'panel-etiqueta';
    etiqueta.textContent = 'Función:';
    fila.appendChild(etiqueta);

    FUNCIONES_POR_TIPO[tipoActivo].forEach(funcion => {
      const btn = document.createElement('button');
      btn.className = 'btn-funcion';
      btn.dataset.funcion = funcion;
      btn.textContent = ETIQUETAS_FUNCION[funcion];
      btn.addEventListener('click', () => elegirFuncion(funcion));
      fila.appendChild(btn);
    });

    actualizarBotonesFuncion();
    ajustarEspacioPanel();
  }

  function elegirFuncion(funcion) {
    funcionActiva = (funcionActiva === funcion) ? null : funcion;
    actualizarBotonesFuncion();
    actualizarBotonConfirmar();
  }

  function actualizarBotonesFuncion() {
    document.querySelectorAll('.btn-funcion').forEach(btn => {
      btn.classList.toggle('activo', btn.dataset.funcion === funcionActiva);
    });
  }

  function actualizarBotonConfirmar() {
    document.getElementById('btn-confirmar').disabled = !(tipoActivo && funcionActiva);
  }

  function confirmarSintagma() {
    if (!tipoActivo || !funcionActiva || seleccion.size === 0) return;

    const nuevoSintagma = {
      id: 's' + (sintagmas.length + 1),
      tokens: [...seleccion],
      tipo: tipoActivo,
      funcion: funcionActiva,
      nucleo: null
    };
    sintagmas.push(nuevoSintagma);

    if (requiereNucleo(nuevoSintagma.tipo, nuevoSintagma.funcion)) {
      if (nuevoSintagma.tokens.length === 1) {
        nuevoSintagma.nucleo = nuevoSintagma.tokens[0]; // un solo token: es su propio núcleo
      } else {
        sintagmaEligiendoNucleo = nuevoSintagma.id;
      }
    }

    seleccion.clear();
    actualizarEstiloTokens();
    resetPanelEtiquetado();
    actualizarPanelTipo();
    actualizarBannerNucleo();
    limpiarResultados();
  }

  function cancelarSeleccion() {
    seleccion.clear();
    actualizarEstiloTokens();
    resetPanelEtiquetado();
    actualizarPanelTipo();
  }

  function renderOracion(oracion) {
    const contenedor = document.getElementById('oracion');
    contenedor.innerHTML = '';

    oracion.tokens.forEach((token, indice) => {
      const span = document.createElement('span');
      span.className = 'token';
      span.dataset.tokenId = token.id;
      span.textContent = token.forma;
      span.addEventListener('click', () => alternarSeleccion(token.id));
      contenedor.appendChild(span);
    });

    const punto = document.createElement('span');
    punto.className = 'puntuacion';
    punto.textContent = '.';
    contenedor.appendChild(punto);
  }

  document.querySelectorAll('.btn-tipo').forEach(btn => {
    btn.addEventListener('click', () => elegirTipo(btn.dataset.tipo));
  });
  document.getElementById('btn-confirmar').addEventListener('click', confirmarSintagma);
  document.getElementById('btn-cancelar').addEventListener('click', cancelarSeleccion);

  function actualizarBadgeEliptico() {
    const badge = document.getElementById('badge-eliptico');
    const btnAbrir = document.getElementById('btn-eliptico');

    if (sujetoEliptico) {
      badge.style.display = 'inline-flex';
      badge.textContent = 'Sujeto elíptico: ' + sujetoEliptico.etiqueta + ' ✕';
      btnAbrir.style.display = 'none';
    } else {
      badge.style.display = 'none';
      btnAbrir.style.display = 'inline-block';
    }
  }

  document.getElementById('btn-eliptico').addEventListener('click', () => {
    document.getElementById('form-eliptico').style.display = 'flex';
    document.getElementById('btn-eliptico').style.display = 'none';
  });

  document.getElementById('btn-cancelar-eliptico').addEventListener('click', () => {
    document.getElementById('form-eliptico').style.display = 'none';
    document.getElementById('btn-eliptico').style.display = 'inline-block';
  });

  document.getElementById('btn-confirmar-eliptico').addEventListener('click', () => {
    const select = document.getElementById('select-persona');
    sujetoEliptico = {
      persona: select.value,
      etiqueta: select.options[select.selectedIndex].text
    };

    sintagmas.push({
      id: 's' + (sintagmas.length + 1),
      tokens: [],
      tipo: 'SN',
      funcion: 'Sujeto',
      eliptico: true,
      persona: sujetoEliptico.persona
    });

    document.getElementById('form-eliptico').style.display = 'none';
    actualizarBadgeEliptico();
    limpiarResultados();
  });

  document.getElementById('badge-eliptico').addEventListener('click', () => {
    const idx = sintagmas.findIndex(s => s.eliptico);
    if (idx !== -1) sintagmas.splice(idx, 1);
    sujetoEliptico = null;
    actualizarBadgeEliptico();
    limpiarResultados();
  });

  // ─────────────────────────────────────────────────────────────
  // MOTOR DE VALIDACIÓN
  // Modelo de "conjuntos de tokens": cada sintagma del alumno se compara
  // por su conjunto de ids contra la solución canónica (orden indiferente,
  // discontinuos permitidos, sin solapamientos). Feedback solo al pulsar
  // Comprobar; nunca durante la construcción.
  // ─────────────────────────────────────────────────────────────

  function claveTokens(tokens) {
    return [...tokens].sort((a, b) => a - b).join(',');
  }

  function formasDe(tokens) {
    return tokens
      .map(id => oracion.tokens.find(t => t.id === id).forma)
      .join(' ');
  }

  function buscarCanonico(tokens) {
    const clave = claveTokens(tokens);
    return oracion.solucion_canonica.sintagmas.find(s => claveTokens(s.tokens) === clave);
  }

  function buscarErrorComun(tokens) {
    const clave = claveTokens(tokens);
    return oracion.feedback.errores_comunes.find(e => claveTokens(e.tokens) === clave);
  }

  function buscarAlternativa(sintagmaId, tipo, funcion) {
    return oracion.alternativas.find(a =>
      a.sintagma_id === sintagmaId && a.tipo_alt === tipo && a.funcion_alt === funcion);
  }

  function marcarEstado(tokens, clase) {
    tokens.forEach(id => {
      const span = document.querySelector('.token[data-token-id="' + id + '"]');
      if (span) span.classList.add(clase);
    });
  }

  function limpiarResultados() {
    document.getElementById('resultados').innerHTML = '';
    document.querySelectorAll('.token').forEach(s =>
      s.classList.remove('estado-ok', 'estado-alt', 'estado-error'));
  }

  function comprobar() {
    limpiarResultados();

    const items = [];
    let nOk = 0;
    const cubiertos = new Set();

    sintagmas.forEach(sint => {
      // Caso especial: sujeto elíptico.
      if (sint.eliptico) {
        const canElip = oracion.solucion_canonica.sintagmas.find(s => s.eliptico);
        if (canElip) {
          if (canElip.persona === sint.persona) {
            nOk++;
            items.push({ estado: 'ok', grupo: 'Sujeto elíptico', texto: 'Sujeto elíptico correcto.' });
          } else {
            items.push({ estado: 'error', grupo: 'Sujeto elíptico', texto: 'El sujeto es elíptico, pero la persona gramatical no es la correcta. Fíjate en la desinencia del verbo.' });
          }
        } else {
          items.push({ estado: 'error', grupo: 'Sujeto elíptico', texto: 'Esta oración tiene sujeto explícito («los dos hermanos pequeños de María»). No lleva sujeto elíptico.' });
        }
        return;
      }

      const can = buscarCanonico(sint.tokens);

      if (can) {
        cubiertos.add(claveTokens(can.tokens));

        if (can.tipo === sint.tipo && can.funcion === sint.funcion) {
          // Análisis interno mínimo: en SN-Sujeto y SV-Predicado también se exige el núcleo.
          if (requiereNucleo(can.tipo, can.funcion) && sint.nucleo !== can.nucleo) {
            marcarEstado(sint.tokens, 'estado-error');
            const textoNucleo = (sint.nucleo === null)
              ? 'Te faltó marcar el núcleo de este sintagma.'
              : 'El núcleo que marcaste no es correcto. El núcleo real es «' +
                oracion.tokens.find(t => t.id === can.nucleo).forma + '».';
            items.push({ estado: 'error', grupo: formasDe(sint.tokens), texto: textoNucleo });
          } else {
            marcarEstado(sint.tokens, 'estado-ok');
            nOk++;
            items.push({ estado: 'ok', grupo: formasDe(sint.tokens),
              texto: 'Análisis correcto: ' + sint.tipo + ' / ' + ETIQUETAS_FUNCION[sint.funcion] + '.' });
          }
        } else {
          const alt = buscarAlternativa(can.id, sint.tipo, sint.funcion);
          if (alt) {
            marcarEstado(sint.tokens, 'estado-alt');
            items.push({ estado: 'alt', grupo: formasDe(sint.tokens), texto: alt.nota });
          } else {
            marcarEstado(sint.tokens, 'estado-error');
            let texto;
            if (can.tipo !== sint.tipo) {
              texto = 'Lo has etiquetado como ' + sint.tipo + ', pero su tipo es ' + can.tipo +
                '. Fíjate en el núcleo del sintagma.';
            } else {
              texto = 'Lo has clasificado como ' + ETIQUETAS_FUNCION[sint.funcion] +
                ', pero su función es ' + ETIQUETAS_FUNCION[can.funcion] + '.';
            }
            items.push({ estado: 'error', grupo: formasDe(sint.tokens), texto: texto });
          }
        }
      } else {
        // No coincide con ningún sintagma canónico: error de segmentación.
        marcarEstado(sint.tokens, 'estado-error');
        const ec = buscarErrorComun(sint.tokens);
        const texto = ec
          ? ec.mensaje
          : 'Esta agrupación no se corresponde con ningún sintagma de la oración. Revisa qué palabras forman realmente una unidad.';
        items.push({ estado: 'error', grupo: formasDe(sint.tokens), texto: texto });
      }
    });

    // Sintagmas canónicos que el alumno no llegó a analizar (sin revelar
    // su tipo/función: no es un error, es algo pendiente).
    oracion.solucion_canonica.sintagmas.forEach(can => {
      if (can.eliptico) return;
      if (!cubiertos.has(claveTokens(can.tokens))) {
        items.push({ estado: 'falta', grupo: formasDe(can.tokens),
          texto: 'Te faltó analizar estas palabras: no las agrupaste en ningún sintagma.' });
      }
    });

    renderResultados(items, nOk, oracion.solucion_canonica.sintagmas.length);
  }

  function renderResultados(items, nOk, total) {
    const cont = document.getElementById('resultados');
    cont.innerHTML = '';

    const resumen = document.createElement('div');
    resumen.id = 'resumen-resultados';
    resumen.textContent = 'Resultado: ' + nOk + ' de ' + total + ' sintagmas correctos.';
    cont.appendChild(resumen);

    const ICONO = { ok: '✔', alt: '◎', error: '✘', falta: '•' };

    items.forEach(it => {
      const div = document.createElement('div');
      div.className = 'resultado-item ' + it.estado;

      const icono = document.createElement('span');
      icono.className = 'icono';
      icono.textContent = ICONO[it.estado];

      const cuerpo = document.createElement('span');
      const grupo = document.createElement('span');
      grupo.className = 'resultado-grupo';
      grupo.textContent = '«' + it.grupo + '» ';
      cuerpo.appendChild(grupo);
      cuerpo.appendChild(document.createTextNode('— ' + it.texto));

      div.appendChild(icono);
      div.appendChild(cuerpo);
      cont.appendChild(div);
    });
  }

  function verSolucion() {
    // Acción explícita y registrable (el registro real es de la Fase 3).
    console.log('[Analizador] El alumno ha pedido "Ver solución" para', oracion.id);

    const cont = document.getElementById('resultados');
    cont.innerHTML = '';

    const titulo = document.createElement('div');
    titulo.id = 'resumen-resultados';
    titulo.textContent = 'Solución de referencia';
    cont.appendChild(titulo);

    oracion.solucion_canonica.sintagmas.forEach(can => {
      const div = document.createElement('div');
      div.className = 'resultado-item ok';
      const grupo = can.eliptico ? 'Sujeto elíptico' : formasDe(can.tokens);
      div.innerHTML = '';
      const g = document.createElement('span');
      g.className = 'resultado-grupo';
      g.textContent = '«' + grupo + '» ';
      let texto = '— ' + can.tipo + ' / ' + ETIQUETAS_FUNCION[can.funcion];
      if (requiereNucleo(can.tipo, can.funcion)) {
        texto += ' (núcleo: «' + oracion.tokens.find(t => t.id === can.nucleo).forma + '»)';
      }
      const t = document.createTextNode(texto);
      div.appendChild(g);
      div.appendChild(t);
      cont.appendChild(div);
    });
  }

  document.getElementById('btn-comprobar').addEventListener('click', comprobar);
  document.getElementById('btn-ver-solucion').addEventListener('click', verSolucion);

  renderOracion(oracion);
</script>
